<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECO Admin Panel - ThicTech Baraboom</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2ecc71; text-align: center; margin-bottom: 5px; }
        .user-info { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #e8f5e9; padding: 10px; border-radius: 10px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #2ecc71; color: white; }
        .product-card { background: #f9f9f9; padding: 15px; margin-top: 10px; border-radius: 12px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-del-mini { background: #e74c3c; color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠 VECO Admin</h2>
    <div id="user-display" class="user-info" style="display: none;">
        <img id="user-img" src="" alt="Profile">
        <span id="user-name">กำลังโหลด...</span>
    </div>

    <!-- ส่วนเพิ่มสินค้า -->
    <div id="input-section">
        <input type="text" id="itemName" placeholder="ชื่อสินค้า (เช่น ทุเรียน, พลาสติก)">
        <input type="number" id="p1" placeholder="ราคาเกรด 1">
        <input type="number" id="p2" placeholder="ราคาเกรด 2">
        <button class="btn-add" onclick="sendData('add')">➕ เพิ่มสินค้าใหม่</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <!-- ส่วนแสดงรายการที่มีอยู่ -->
    <h3>📦 รายการของคุณ</h3>
    <div id="product-list">
        <p style="text-align:center; color:#999;">กำลังโหลดรายการสินค้า...</p>
    </div>
</div>

<script>
    // 1. ใส่ข้อมูลของคุณตรงนี้
    const MY_LIFF_ID = "2009975524-xymUHzaC"; 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec"; 

    let userDisplayName = "";

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                document.getElementById("user-display").style.display = "flex";
                document.getElementById("user-name").innerText = "ร้าน: " + userDisplayName;
                document.getElementById("user-img").src = profile.pictureUrl;
                
                // โหลดข้อมูลจาก Sheets มาโชว์ทันที
                loadProducts(); 
            }
        } catch (error) { console.error("LIFF Error:", error); }
    }

    // ฟังก์ชันดึงข้อมูลมาโชว์ (doGet)
    async function loadProducts() {
        const listDiv = document.getElementById("product-list");
        try {
            const response = await fetch(`${SCRIPT_URL}?shopName=${encodeURIComponent(userDisplayName)}`);
            const products = await response.json();
            
            if (!products || products.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center;'>ยังไม่มีสินค้าในระบบ</p>";
                return;
            }

            let html = "";
            products.forEach(row => {
                // row[0]=ร้าน, row[1]=ชื่อสินค้า, row[2]=ราคา1
                html += `
                    <div class="product-card">
                        <div>
                            <strong>${row[1]}</strong><br>
                            <small>ราคาเกรด 1: ${row[2] || 0} บาท</small>
                        </div>
                        <button class="btn-del-mini" onclick="confirmDelete('${row[1]}')">ลบ</button>
                    </div>`;
            });
            listDiv.innerHTML = html;
        } catch (e) { listDiv.innerHTML = "<p>ไม่พบข้อมูลรายการ</p>"; }
    }

    async function sendData(actionType, targetItem = null) {
        const itemName = targetItem || document.getElementById("itemName").value;
        if (!itemName) return alert("กรุณาระบุชื่อสินค้า");

        const data = {
            action: actionType,
            shopName: userDisplayName,
            itemName: itemName,
            price1: document.getElementById("p1").value || 0,
            price2: document.getElementById("p2").value || 0
        };

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });
            alert("ดำเนินการสำเร็จ!");
            document.getElementById("itemName").value = "";
            loadProducts(); // อัปเดตรายการใหม่หลังทำรายการเสร็จ
        } catch (e) { alert("เกิดข้อผิดพลาด"); }
    }

    function confirmDelete(name) {
        if(confirm(`ยืนยันการลบ "${name}"?`)) {
            sendData('delete', name);
        }
    }

    initLiff();
</script>
</body>
</html>
