<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veco Store</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

    body {
      font-family: 'Kanit', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    /* ส่วนหัว: ใช้รูป image_4.png เป็นพื้นหลังทั้งหมด */
    .header-image {
      width: 100%;
      height: auto;
      aspect-ratio: 1000 / 334; /* สัดส่วนตามรูปภาพของคุณ */
      background-image: url(https://lh3.googleusercontent.com/d/1g7peh4Iz0oTxrNKEzmxOgHo1RY4WoaJ2); /* ใส่ Link รูปภาพ image_4.png ที่นี่ */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: top center;
    }

    .container {
      max-width: 400px;
      margin: -40px auto 40px; /* ขยับขึ้นไปเกยทับรูปแบนเนอร์เล็กน้อย */
      padding: 25px;
      background-color: white;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
      width: 85%;
    }

    .shop-title {
      text-align: center;
      color: #88d462;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .input-group {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      font-family: 'Kanit', sans-serif;
    }

    input:focus {
      border-color: #88d462;
    }

    .btn-submit {
      background-color: #88d462;
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background-color: #76c051;
    }

    .footer-link {
      display: block;
      margin-top: 20px;
      color: #333;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <!-- ส่วนรูปแบนเนอร์ -->
  <div class="header-image"></div>

  <!-- ส่วนฟอร์มกรอกข้อมูล -->
  <div class="container">
    <div class="shop-title">Veco Store</div>
    
    <div class="input-group">
      <input type="text" id="shopLocate" placeholder="ใส่ลิ้งที่อยู่">
    </div>
    <div class="input-group">
      <input type="text" id="itemName" placeholder="ชื่อสินค้า">
    </div>
    <div class="input-group">
      <input type="number" id="price1" placeholder="ราคาคุณภาพสวย">
    </div>
    <div class="input-group">
      <input type="number" id="price2" placeholder="ราคาคุณภาพมีตำหนิเล็กน้อย">
    </div>
    <div class="input-group">
      <input type="number" id="price3" placeholder="ราคาคุณภาพมีตำหนิมากกินได้">
    </div>
    <div class="input-group">
      <input type="number" id="price4" placeholder="ราคาคุณภาพรับประทานไม่ได้">
    </div>

    <button class="btn-submit" onclick="submitData()">เพิ่มสินค้าใหม่</button>

    <a href="#" class="footer-link">รายการของคุณ</a>
  </div>

  <script>
    function submitData() {
      const scriptUrl = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec"; // ใส่ URL ของคุณที่นี่
      
      const btn = document.querySelector('.btn-submit');
      btn.innerText = "กำลังบันทึก...";
      btn.disabled = true;

      const data = {
        shopName: document.getElementById('shopLocate').value, // ใช้ช่องที่อยู่เป็น shopName ตามโครงสร้างเดิม
        itemName: document.getElementById('itemName').value,
        price1: document.getElementById('price1').value,
        price2: document.getElementById('price2').value,
        price3: document.getElementById('price3').value,
        price4: document.getElementById('price4').value,
        action: "insert"
      };

      fetch(scriptUrl, {
        method: 'POST',
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(result => {
        alert("บันทึกสำเร็จ!");
        document.querySelectorAll('input').forEach(i => i.value = '');
      })
      .catch(err => alert("เกิดข้อผิดพลาด"))
      .finally(() => {
        btn.innerText = "เพิ่มสินค้าใหม่";
        btn.disabled = false;
      });
    }
  </script>

</body>
</html>
