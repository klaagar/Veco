<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veco Store - Admin</title>
    <!-- เชื่อมต่อ LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7f3e9; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header-banner { width: 100%; max-width: 500px; position: relative; }
        .header-banner img { width: 100%; display: block; }
        
        .card { 
            background: white; 
            width: 85%; 
            max-width: 400px; 
            padding: 30px 20px; 
            border-radius: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-top: -10px; 
            position: relative; 
            z-index: 10; 
            text-align: center; 
        }
        h1 { color: #8fd462; font-size: 28px; margin: 0 0 20px 0; }
        
        input { width: 100%; padding: 12px 15px; margin-bottom: 12px; border: 1.5px solid #ccc; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: 'Kanit', sans-serif; outline: none; }
        input:focus { border-color: #8fd462; }
        
        .btn-add { width: 100%; padding: 15px; background-color: #8fd462; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 500; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .btn-add:active { background-color: #76b151; transform: scale(0.98); }
        .btn-add:disabled { background-color: #ccc; cursor: not-allowed; }
        
        h3 { text-align: left; font-weight: 400; color: #333; margin-top: 25px; padding-left: 5px; }
        .product-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .btn-del { background: #ff6b6b; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        #status-msg { font-size: 14px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header-banner">
    <img src="https://lh3.googleusercontent.com/d/1g7peh4Iz0oTxrNKEzmxOgHo1RY4WoaJ2" alt="Banner">
</div>

<div class="card">
    <h1>Veco Store</h1>
    <div id="status-msg">กำลังโหลดข้อมูล LINE...</div>
    
    <input type="text" id="shopAddress" placeholder="ใส่ลิงก์ที่อยู่ผู้ขาย" oninput="saveAddress()">
    
    <input type="text" id="itemName" placeholder="ชื่อสินค้า">
    <input type="number" id="p1" placeholder="ราคาคุณภาพสวย">
    <input type="number" id="p2" placeholder="ราคาคุณภาพมีตำหนิเล็กน้อย">
    <input type="number" id="p3" placeholder="ราคาคุณภาพมีตำหนิมากกินได้">
    <input type="number" id="p4" placeholder="ราคาคุณภาพรับประทานไม่ได้">
    
    <button id="mainBtn" class="btn-add" onclick="sendData('add')">เพิ่มสินค้าใหม่</button>
    
    <h3>รายการของคุณ</h3>
    <div id="product-list">
        <p style="color: #999; font-size: 14px;">รอสักครู่...</p>
    </div>
</div>

<script>
    // --- ⚠️ แก้ไขจุดนี้ ⚠️ ---
    const MY_LIFF_ID = "2009975524-xymUHzac"; // แก้เป็น c เล็กตามหน้าจอวิดีโอ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec"; // วาง URL จาก Apps Script ของคุณกล้า
    // ----------------------

    let userDisplayName = "";

    function saveAddress() {
        localStorage.setItem("veco_address", document.getElementById("shopAddress").value);
    }

    function loadSavedAddress() {
        const savedAddr = localStorage.getItem("veco_address");
        if (savedAddr) document.getElementById("shopAddress").value = savedAddr;
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                document.getElementById("status-msg").innerText = "แอดมิน: " + userDisplayName;
                loadSavedAddress();
                loadProducts(); 
            }
        } catch (error) { 
            console.error(error); 
            document.getElementById("status-msg").innerText = "กรุณาเข้าใช้งานผ่าน LINE";
        }
    }

    async function loadProducts() {
        const listDiv = document.getElementById("product-list");
        try {
            // ดึงข้อมูลมาแสดงผล (ต้องมั่นใจว่า Apps Script รองรับ doGet)
            const response = await fetch(`${SCRIPT_URL}?shopName=${encodeURIComponent(userDisplayName)}`);
            const products = await response.json();
            
            if (!products || products.length === 0) {
                listDiv.innerHTML = "<p style='color:#999;'>ยังไม่มีรายการสินค้า</p>";
                return;
            }

            let html = "";
            products.forEach(row => {
                html += `
                    <div class="product-item">
                        <div>
                            <strong>${row[1]}</strong><br>
                            <small>สวย: ${row[2]} | ตำหนิ: ${row[3]} | มาก: ${row[4]} | กินไม่ได้: ${row[5]}</small>
                        </div>
                        <button class="btn-del" onclick="confirmDelete('${row[1]}')">ลบ</button>
                    </div>`;
            });
            listDiv.innerHTML = html;
        } catch (e) { 
            listDiv.innerHTML = "<p style='color:#999;'>เพิ่มสินค้าใหม่เพื่อเริ่มรายการ</p>"; 
        }
    }

    async function sendData(actionType, targetItem = null) {
        const itemName = targetItem || document.getElementById("itemName").value;
        if (!itemName) return alert("กรุณาระบุชื่อสินค้า");

        const btn = document.getElementById("mainBtn");
        btn.disabled = true;
        btn.innerText = "กำลังประมวลผล...";

        const data = {
            action: actionType,
            shopName: userDisplayName,
            address: document.getElementById("shopAddress").value,
            itemName: itemName,
            price1: document.getElementById("p1").value || 0,
            price2: document.getElementById("p2").value || 0,
            price3: document.getElementById("p3").value || 0,
            price4: document.getElementById("p4").value || 0
        };

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            
            alert("ดำเนินการสำเร็จ!");
            if(actionType === 'add') {
                document.getElementById("itemName").value = "";
                document.getElementById("p1").value = "";
                document.getElementById("p2").value = "";
                document.getElementById("p3").value = "";
                document.getElementById("p4").value = "";
            }
            // รีโหลดข้อมูลหลังทำงานเสร็จ
            setTimeout(() => { location.reload(); }, 500);
        } catch (e) { 
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); 
        } finally {
            btn.disabled = false;
            btn.innerText = "เพิ่มสินค้าใหม่";
        }
    }

    function confirmDelete(name) {
        if(confirm(`คุณต้องการลบ "${name}" ใช่หรือไม่?`)) sendData('delete', name);
    }

    initLiff();
</script>

</body>
</html>
