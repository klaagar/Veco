<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veco Store - Admin</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
    body { font-family: 'Kanit', sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
    .header-image { width: 100%; height: auto; aspect-ratio: 1000 / 334; background-image: url(https://lh3.googleusercontent.com/d/1g7peh4Iz0oTxrNKEzmxOgHo1RY4WoaJ2); background-size: contain; background-repeat: no-repeat; background-position: top center; }
    .container { max-width: 450px; margin: -40px auto 40px; padding: 25px; background-color: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; width: 85%; }
    .shop-title { text-align: center; color: #88d462; font-size: 32px; margin-bottom: 10px; font-weight: 500; }
    .user-info { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #e8f5e9; padding: 10px; border-radius: 15px; }
    .user-info img { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; }
    .input-group { margin-bottom: 10px; }
    input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; font-family: 'Kanit', sans-serif; }
    input:focus { border-color: #88d462; }
    #shopLocate { background-color: #fffef0; border: 1px solid #ffeaa7; }
    .btn-submit { background-color: #88d462; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn-submit:hover { background-color: #76c051; }
    .product-list-section { margin-top: 30px; }
    .product-card { background: #f9f9f9; padding: 15px; margin-top: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    .product-info b { color: #333; font-size: 16px; }
    .product-info small { color: #777; }
    .btn-del { background: #e74c3c; color: white; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>

  <div class="header-image"></div>

  <div class="container">
    <div class="shop-title">Veco Store</div>
    
    <div id="user-display" class="user-info" style="display: none;">
        <img id="user-img" src="" alt="Profile">
        <span id="user-name">กำลังโหลด...</span>
    </div>

    <div class="input-section">
      <div class="input-group">
        <input type="text" id="shopLocate" placeholder="ใส่ลิ้งที่อยู่" oninput="saveLocate()">
      </div>
      <div class="input-group">
        <input type="text" id="itemName" placeholder="ชื่อสินค้า">
      </div>
      <div class="input-group">
        <input type="number" id="p1" placeholder="ราคาคุณภาพสวย">
      </div>
      <div class="input-group">
        <input type="number" id="p2" placeholder="ราคาคุณภาพมีตำหนิเล็กน้อย">
      </div>
      <div class="input-group">
        <input type="number" id="p3" placeholder="ราคาคุณภาพมีตำหนิมากกินได้">
      </div>
      <div class="input-group">
        <input type="number" id="p4" placeholder="ราคาคุณภาพรับประทานไม่ได้">
      </div>

      <button class="btn-submit" id="mainBtn" onclick="sendData('insert')">➕ เพิ่มสินค้าใหม่</button>
    </div>

    <div class="product-list-section">
      <h3>📦 รายการของคุณ</h3>
      <div id="product-list">
          <p style="text-align:center; color:#999;">กำลังโหลดรายการ...</p>
      </div>
    </div>
  </div>

  <script>
    const MY_LIFF_ID = "2009975524-xymUHzaC"; 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoWuD1R5dM0oZieq7pSSMzEERjy0oqiKSe0rMS8nIDQTXLP1qBfQD_rkZ_m7PQHPAHEg/exec"; 

    let userDisplayName = "";

    // ✅ ฟังก์ชันแกะพิกัดจาก URL ใน browser
    async function resolveLocation(url) {
      if (!url) return "";
      
      // ถ้าไม่ใช่ลิ้งก์สั้น ให้แกะพิกัดตรงๆ เลย
      const match = 
        url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) ||
        url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/) ||
        url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/) ||
        url.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
      
      if (match) return match[1] + "," + match[2];
      
      // ถ้าเป็นลิ้งก์สั้น ให้ตามผ่าน API แก้ CORS
      if (url.includes("goo.gl") || url.includes("maps.app")) {
        try {
          // ใช้ allorigins เพื่อแก้ปัญหา CORS
          const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
          const res = await fetch(proxyUrl);
          const data = await res.json();
          const finalUrl = data.status?.url || "";
          
          const m2 = 
            finalUrl.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) ||
            finalUrl.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
          
          if (m2) return m2[1] + "," + m2[2];
        } catch(e) {
          console.log("resolve error:", e);
        }
      }
      
      return url; // ถ้าแกะไม่ได้ส่ง URL ไปตามเดิม
    }

    function saveLocate() {
        const val = document.getElementById("shopLocate").value;
        localStorage.setItem("veco_saved_locate", val);
    }

    function loadSavedLocate() {
        const saved = localStorage.getItem("veco_saved_locate");
        if (saved) document.getElementById("shopLocate").value = saved;
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                document.getElementById("user-display").style.display = "flex";
                document.getElementById("user-name").innerText = userDisplayName;
                document.getElementById("user-img").src = profile.pictureUrl;
                loadSavedLocate();
                loadProducts();
            }
        } catch (error) {
            console.error("LIFF Error:", error);
        }
    }

    async function loadProducts() {
        const listDiv = document.getElementById("product-list");
        try {
            const response = await fetch(`${SCRIPT_URL}?shopName=${encodeURIComponent(userDisplayName)}`);
            const products = await response.json();
            let html = "";
            if (!products || products.length === 0) {
                html = "<p style='text-align:center; color:#999;'>ยังไม่มีรายการสินค้า</p>";
            } else {
                products.forEach(row => {
                    html += `
                        <div class="product-card">
                            <div class="product-info">
                                <b>${row[1]}</b><br>
                                <small>สวย: ${row[2]} | มีตำหนิ: ${row[3]}</small>
                            </div>
                            <button class="btn-del" onclick="confirmDelete('${row[1]}')">ลบ</button>
                        </div>`;
                });
            }
            listDiv.innerHTML = html;
        } catch (e) {
            listDiv.innerHTML = "<p style='text-align:center;'>ไม่สามารถโหลดข้อมูลได้</p>";
        }
    }

    async function sendData(actionType, targetItem = null) {
        const itemName = targetItem || document.getElementById("itemName").value;
        if (!itemName) return alert("กรุณาระบุชื่อสินค้า");

        const btn = document.getElementById("mainBtn");
        if (actionType === 'insert') {
            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;
        }

        // ✅ แกะพิกัดก่อนส่ง
        const rawLocate = document.getElementById("shopLocate").value || "";
        const cleanLocate = actionType === 'insert' ? await resolveLocation(rawLocate) : rawLocate;

        const data = {
            action: actionType,
            shopName: userDisplayName,
            itemName: itemName,
            price1: document.getElementById("p1").value || 0,
            price2: document.getElementById("p2").value || 0,
            price3: document.getElementById("p3").value || 0,
            price4: document.getElementById("p4").value || 0,
            shopLocate: cleanLocate
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            alert("ดำเนินการสำเร็จ!");
            if (actionType === 'insert') {
                document.getElementById("itemName").value = "";
                document.getElementById("p1").value = "";
                document.getElementById("p2").value = "";
                document.getElementById("p3").value = "";
                document.getElementById("p4").value = "";
            }
            loadProducts();
        } catch (e) {
            loadProducts();
        } finally {
            btn.innerText = "➕ เพิ่มสินค้าใหม่";
            btn.disabled = false;
        }
    }

    function confirmDelete(name) {
        if (confirm(`คุณต้องการลบรายการ "${name}" ใช่หรือไม่?`)) {
            sendData('delete', name);
        }
    }

    initLiff();
  </script>
</body>
</html>
