<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veco Store</title>
  
  <!-- 1. นำเข้า LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

    body {
      font-family: 'Kanit', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    .header-image {
      width: 100%;
      height: auto;
      aspect-ratio: 1000 / 334;
      background-image: url(https://lh3.googleusercontent.com/d/1g7peh4Iz0oTxrNKEzmxOgHo1RY4WoaJ2); 
      background-size: contain;
      background-repeat: no-repeat;
      background-position: top center;
    }

    .container {
      max-width: 400px;
      margin: -40px auto 40px;
      padding: 25px;
      background-color: white;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
      width: 85%;
    }

    .shop-title {
      text-align: center;
      color: #88d462;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .user-info {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        font-size: 14px;
        color: #666;
    }

    .user-info img {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        margin-right: 10px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      font-family: 'Kanit', sans-serif;
    }

    input:focus {
      border-color: #88d462;
    }

    .btn-submit {
      background-color: #88d462;
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background-color: #76c051;
    }

    .footer-link {
      display: block;
      margin-top: 20px;
      color: #333;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="header-image"></div>

  <div class="container">
    <div class="shop-title">Veco Store</div>
    
    <!-- ส่วนแสดงข้อมูลผู้ใช้จาก LINE -->
    <div id="user-info" class="user-info" style="display:none;">
        <img id="user-profile" src="" alt="Profile">
        <span id="user-name">กำลังโหลดข้อมูล...</span>
    </div>

    <div class="input-group">
      <input type="text" id="shopLocate" placeholder="ใส่ลิ้งที่อยู่">
    </div>
    <div class="input-group">
      <input type="text" id="itemName" placeholder="ชื่อสินค้า">
    </div>
    <div class="input-group">
      <input type="number" id="price1" placeholder="ราคาคุณภาพสวย">
    </div>
    <div class="input-group">
      <input type="number" id="price2" placeholder="ราคาคุณภาพมีตำหนิเล็กน้อย">
    </div>
    <div class="input-group">
      <input type="number" id="price3" placeholder="ราคาคุณภาพมีตำหนิมากกินได้">
    </div>
    <div class="input-group">
      <input type="number" id="price4" placeholder="ราคาคุณภาพรับประทานไม่ได้">
    </div>

    <button class="btn-submit" onclick="submitData()">เพิ่มสินค้าใหม่</button>

    <a href="#" class="footer-link">รายการของคุณ</a>
  </div>

  <script>
    // 2. ตั้งค่า LIFF ID ของคุณ
    const MY_LIFF_ID = "2009975524-xymUHzaC"; 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec";

    // ฟังก์ชันเริ่มต้น LIFF
    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById("user-info").style.display = "flex";
                document.getElementById("user-name").innerText = profile.displayName;
                document.getElementById("user-profile").src = profile.pictureUrl;
            }
        } catch (error) {
            console.error("LIFF Initialization failed", error);
        }
    }

    // เรียกใช้งาน LIFF ทันทีที่โหลดหน้าเว็บ
    initLiff();

    async function submitData() {
      const btn = document.querySelector('.btn-submit');
      const profile = await liff.getProfile(); // ดึงชื่อโปรไฟล์เพื่อความถูกต้อง
      
      btn.innerText = "กำลังบันทึก...";
      btn.disabled = true;

      const data = {
        shopName: profile.displayName, // ใช้ชื่อจาก LINE อัตโนมัติ หรือจะใช้ช่องกรอกเดิมก็ได้
        shopLocate: document.getElementById('shopLocate').value,
        itemName: document.getElementById('itemName').value,
        price1: document.getElementById('price1').value,
        price2: document.getElementById('price2').value,
        price3: document.getElementById('price3').value,
        price4: document.getElementById('price4').value,
        action: "insert"
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(result => {
        alert("บันทึกสำเร็จ!");
        document.querySelectorAll('input').forEach(i => i.value = '');
        liff.closeWindow(); // ปรับแต่ง: ปิดหน้าต่าง LIFF หลังบันทึกสำเร็จ
      })
      .catch(err => alert("เกิดข้อผิดพลาด"))
      .finally(() => {
        btn.innerText = "เพิ่มสินค้าใหม่";
        btn.disabled = false;
      });
    }
  </script>

</body>
</html>
