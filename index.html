<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veco Store - Admin</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7f3e9; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .card { background: white; width: 85%; max-width: 400px; padding: 30px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 20px; text-align: center; }
        .profile-area { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        #profile-pic { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #8fd462; }
        h1 { color: #8fd462; margin: 10px 0; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #ccc; border-radius: 12px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 15px; background-color: #8fd462; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; }
        .product-item { background: #fff; padding: 15px; margin-top: 10px; border-radius: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #ff6b6b; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-area" id="profileArea" style="display:none;">
        <img id="profile-pic" src="">
        <p id="profile-name" style="font-weight:500;"></p>
    </div>

    <h1>Veco Store</h1>
    
    <input type="text" id="shopAddress" placeholder="ลิงก์พิกัดร้านค้า/ที่อยู่" oninput="saveAddress()">
    <input type="text" id="itemName" placeholder="ชื่อสินค้า">
    <input type="number" id="p1" placeholder="ราคา: เกรดสวย">
    <input type="number" id="p2" placeholder="ราคา: มีตำหนินิดหน่อย">
    <input type="number" id="p3" placeholder="ราคา: ตำหนิเยอะ">
    <input type="number" id="p4" placeholder="ราคา: กินไม่ได้">
    
    <button class="btn-add" id="mainBtn" onclick="sendData('add')">เพิ่มสินค้าเข้าระบบ</button>
    
    <h3 style="text-align:left; margin-top:20px;">รายการของคุณ</h3>
    <div id="product-list">
        <p style="color:#999;">กำลังโหลด...</p>
    </div>
</div>

<script>
    // ⚠️ วาง URL ที่ได้จาก New Deployment ล่าสุดตรงนี้ครับ!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3Ieije4hDoGntyAxB8vMtppUU80J4fh-8K34ZsmJi8VkWbeby_Z1qbeLvxMEevELLEg/exec"; 
    const MY_LIFF_ID = "2009975524-xymUHzaC"; // แก้เป็น c เล็กเรียบร้อยแล้ว

    let userDisplayName = "";

    function saveAddress() { localStorage.setItem("veco_addr", document.getElementById("shopAddress").value); }
    function loadSavedAddress() {
        const saved = localStorage.getItem("veco_addr");
        if (saved) document.getElementById("shopAddress").value = saved;
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); } 
            else {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                document.getElementById('profile-pic').src = profile.pictureUrl;
                document.getElementById('profile-name').innerText = "Admin: " + profile.displayName;
                document.getElementById('profileArea').style.display = 'block';
                loadSavedAddress();
                loadProducts();
            }
        } catch (e) { console.error(e); }
    }

    async function loadProducts() {
        const listDiv = document.getElementById("product-list");
        try {
            const resp = await fetch(`${SCRIPT_URL}?shopName=${encodeURIComponent(userDisplayName)}`);
            const data = await resp.json();
            if (!data || data.length === 0) {
                listDiv.innerHTML = "<p>ยังไม่มีสินค้า</p>"; return;
            }
            let html = "";
            data.forEach(row => {
                if(row[0] === "shopName") return;
                html += `<div class="product-item">
                            <div style="text-align:left;"><strong>${row[1]}</strong><br><small>${row[2]} | ${row[3]} | ${row[4]} | ${row[5]}</small></div>
                            <button class="btn-del" onclick="confirmDelete('${row[1]}')">ลบ</button>
                         </div>`;
            });
            listDiv.innerHTML = html;
        } catch (e) { listDiv.innerHTML = "<p style='color:red;'>ดึงข้อมูลไม่ได้ (เช็ค URL/สิทธิ์)</p>"; }
    }

    async function sendData(actionType, targetItem = null) {
        const itemName = targetItem || document.getElementById("itemName").value;
        if (!itemName) return alert("กรุณาใส่ชื่อสินค้า");
        
        const btn = document.getElementById("mainBtn");
        btn.disabled = true; btn.innerText = "กำลังดำเนินการ...";

        const payload = {
            action: actionType,
            shopName: userDisplayName,
            itemName: itemName,
            price1: document.getElementById("p1").value || 0,
            price2: document.getElementById("p2").value || 0,
            price3: document.getElementById("p3").value || 0,
            price4: document.getElementById("p4").value || 0,
            address: document.getElementById("shopAddress").value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            alert("สำเร็จ!"); location.reload();
        } catch (e) { alert("พลาด!"); btn.disabled = false; }
    }

    function confirmDelete(name) { if(confirm(`ลบ ${name}?`)) sendData('delete', name); }
    initLiff();
</script>
</body>
</html>
