<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veco Store - Admin</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7f3e9; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .header-banner { width: 100%; max-width: 500px; position: relative; }
        .header-banner img { width: 100%; display: block; }
        
        .card { 
            background: white; width: 85%; max-width: 400px; padding: 30px 20px; 
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-top: -15px; position: relative; z-index: 10; text-align: center; 
        }
        
        /* ส่วนแสดงโปรไฟล์ LINE */
        .profile-area { display: none; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        #profile-pic { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #8fd462; object-fit: cover; }
        #profile-name { margin: 8px 0 0; font-weight: 500; color: #333; }

        h1 { color: #8fd462; font-size: 26px; margin: 0 0 20px 0; }
        input { width: 100%; padding: 12px 15px; margin-bottom: 10px; border: 1.5px solid #ccc; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: 'Kanit', sans-serif; outline: none; transition: 0.2s; }
        input:focus { border-color: #8fd462; }
        
        .btn-add { width: 100%; padding: 15px; background-color: #8fd462; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 500; cursor: pointer; margin-top: 5px; }
        .btn-add:active { transform: scale(0.98); background-color: #76b151; }
        
        h3 { text-align: left; font-weight: 400; color: #333; margin-top: 25px; padding-left: 5px; border-left: 4px solid #8fd462; line-height: 1; }
        .product-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .btn-del { background: #ff6b6b; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="header-banner">
    <img src="https://lh3.googleusercontent.com/d/1g7peh4Iz0oTxrNKEzmxOgHo1RY4WoaJ2" alt="Banner">
</div>

<div class="card">
    <!-- ส่วนแสดงโปรไฟล์แอดมิน -->
    <div class="profile-area" id="profileArea">
        <img id="profile-pic" src="" alt="Admin Profile">
        <p id="profile-name">กำลังโหลดชื่อแอดมิน...</p>
    </div>

    <h1>Veco Store</h1>
    
    <!-- A:shopName จะถูกส่งอัตโนมัติจากชื่อ LINE -->
    <!-- H:locate -->
    <input type="text" id="shopAddress" placeholder="ใส่ลิงก์ที่อยู่/พิกัดผู้ขาย" oninput="saveAddress()">
    
    <!-- B:itemName -->
    <input type="text" id="itemName" placeholder="ชื่อสินค้า (เช่น ส้ม, กุ้ง)">
    
    <!-- C-F: ราคาคุณภาพต่างๆ -->
    <input type="number" id="p1" placeholder="ราคา: คุณภาพสวย">
    <input type="number" id="p2" placeholder="ราคา: ตำหนิเล็กน้อย">
    <input type="number" id="p3" placeholder="ราคา: ตำหนิมาก">
    <input type="number" id="p4" placeholder="ราคา: รับประทานไม่ได้">
    
    <button class="btn-add" id="mainBtn" onclick="sendData('add')">เพิ่มสินค้าใหม่</button>
    
    <h3>รายการของคุณ</h3>
    <div id="product-list">
        <p style="color: #999; font-size: 14px;">กำลังโหลดข้อมูลรายการสินค้า...</p>
    </div>
</div>

<script>
    // ⚠️ ต้องเติม URL จากการ Deploy Google Apps Script ตรงนี้ครับ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUsOBhMk9Abxc-sQ76fAgrqBUz-ru7hV_GXQiX1ms_LSa27GvzNfkgygGo43vcnYV9TQ/exec"; 
    const MY_LIFF_ID = "2009975524-xymUHzaC"; // แก้ไขเป็นตัวพิมพ์เล็กตามวิดีโอ IMG_2961.mov

    let userDisplayName = "";

    function saveAddress() {
        localStorage.setItem("veco_address", document.getElementById("shopAddress").value);
    }

    function loadSavedAddress() {
        const savedAddr = localStorage.getItem("veco_address");
        if (savedAddr) document.getElementById("shopAddress").value = savedAddr;
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                
                // แสดงผลโปรไฟล์แอดมิน
                document.getElementById('profile-pic').src = profile.pictureUrl;
                document.getElementById('profile-name').innerText = "สวัสดีคุณ " + profile.displayName;
                document.getElementById('profileArea').style.display = 'block';

                loadSavedAddress();
                loadProducts(); 
            }
        } catch (error) { 
            console.error("LIFF Error:", error);
            document.getElementById("product-list").innerHTML = "<p>กรุณาเปิดใน LINE</p>";
        }
    }

    async function loadProducts() {
        const listDiv = document.getElementById("product-list");
        try {
            const resp = await fetch(`${SCRIPT_URL}?shopName=${encodeURIComponent(userDisplayName)}`);
            const products = await resp.json();
            
            if (!products || products.length === 0) {
                listDiv.innerHTML = "<p style='color:#999;'>ยังไม่มีรายการสินค้าของคุณ</p>";
                return;
            }

            let html = "";
            products.forEach(row => {
                // คอลัมน์: 0=shopName, 1=itemName, 2=p1, 3=p2, 4=p3, 5=p4
                if(row[0] === "shopName") return; // ข้ามหัวตาราง
                html += `
                    <div class="product-item">
                        <div>
                            <strong>${row[1]}</strong><br>
                            <small>ราคา: ${row[2]} | ${row[3]} | ${row[4]} | ${row[5]}</small>
                        </div>
                        <button class="btn-del" onclick="confirmDelete('${row[1]}')">ลบ</button>
                    </div>`;
            });
            listDiv.innerHTML = html;
        } catch (e) { listDiv.innerHTML = "<p>ไม่สามารถดึงข้อมูลได้ (เช็ค URL ในสคริปต์)</p>"; }
    }

    async function sendData(actionType, targetItem = null) {
        const itemName = targetItem || document.getElementById("itemName").value;
        if (!itemName) return alert("กรุณาระบุชื่อสินค้า");

        const btn = document.getElementById("mainBtn");
        btn.disabled = true;
        btn.innerText = "กำลังประมวลผล...";

        const payload = {
            action: actionType,
            shopName: userDisplayName,
            address: document.getElementById("shopAddress").value, // จะไปลงคอลัมน์ locate (H)
            itemName: itemName,
            price1: document.getElementById("p1").value || 0,
            price2: document.getElementById("p2").value || 0,
            price3: document.getElementById("p3").value || 0,
            price4: document.getElementById("p4").value || 0
        };

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            alert("บันทึกข้อมูลสำเร็จ!");
            location.reload(); 
        } catch (e) { 
            alert("ผิดพลาด!"); 
            btn.disabled = false;
            btn.innerText = "เพิ่มสินค้าใหม่";
        }
    }

    function confirmDelete(name) {
        if(confirm(`คุณต้องการลบรายการ "${name}" ใช่หรือไม่?`)) sendData('delete', name);
    }

    initLiff();
</script>
</body>
</html>
