<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veco Store - Admin</title>
    <!-- เชื่อมต่อ LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f7f3e9; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .header-banner { width: 100%; max-width: 500px; position: relative; }
        .header-banner img { width: 100%; display: block; }
        
        .card { 
            background: white; width: 85%; max-width: 400px; padding: 30px 20px; 
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-top: -15px; position: relative; z-index: 10; text-align: center; 
        }
        
        /* ส่วนแสดงโปรไฟล์แอดมินที่ดึงจาก LINE */
        .profile-area { display: none; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        #profile-pic { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #8fd462; object-fit: cover; }
        #profile-name { margin: 8px 0 0; font-weight: 500; color: #333; font-size: 18px; }

        h1 { color: #8fd462; font-size: 26px; margin: 0 0 20px 0; }
        input { width: 100%; padding: 12px 15px; margin-bottom: 10px; border: 1.5px solid #ccc; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: 'Kanit', sans-serif; outline: none; transition: 0.2s; }
        input:focus { border-color: #8fd462; }
        
        .btn-add { width: 100%; padding: 15px; background-color: #8fd462; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 500; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); background-color: #76b151; }
        .btn-add:disabled { background-color: #ccc; cursor: not-allowed; }
        
        h3 { text-align: left; font-weight: 400; color: #333; margin-top: 25px; padding-left: 10px; border-left: 5px solid #8fd462; line-height: 1.2; }
        .product-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .btn-del { background: #ff6b6b; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-del:hover { background: #ee5253; }
    </style>
</head>
<body>

<div class="header-banner">
    <!-- แบนเนอร์ VECO จาก Google Drive -->
    <img src="https://lh3.googleusercontent.com/d/1g7peh4Iz0oTxrNKEzmxOgHo1RY4WoaJ2" alt="Banner">
</div>

<div class="card">
    <!-- ส่วนข้อมูลแอดมิน (จะแสดงเมื่อล็อกอินสำเร็จ) -->
    <div class="profile-area" id="profileArea">
        <img id="profile-pic" src="" alt="Admin Profile">
        <p id="profile-name">กำลังระบุตัวตน...</p>
    </div>

    <h1>Veco Store</h1>
    
    <!-- ฟอร์มกรอกข้อมูลส่งไปยัง Google Sheets -->
    <input type="text" id="shopAddress" placeholder="ลิงก์พิกัดร้านค้า/ที่อยู่" oninput="saveAddress()">
    <input type="text" id="itemName" placeholder="ชื่อสินค้า (เช่น ส้มสายน้ำผึ้ง)">
    
    <input type="number" id="p1" placeholder="ราคา: เกรดสวย">
    <input type="number" id="p2" placeholder="ราคา: มีตำหนิเล็กน้อย">
    <input type="number" id="p3" placeholder="ราคา: ตำหนิมาก">
    <input type="number" id="p4" placeholder="ราคา: ทานไม่ได้">
    
    <button class="btn-add" id="mainBtn" onclick="sendData('add')">เพิ่มสินค้าเข้าชีต</button>
    
    <h3>รายการของคุณ</h3>
    <div id="product-list">
        <p style="color: #999; font-size: 14px;">กำลังดึงรายการสินค้าจากชีต...</p>
    </div>
</div>

<script>
    // ⚠️ สำคัญ: วาง URL ที่ได้จากการ Deploy Google Apps Script ใหม่ล่าสุดที่นี่
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxi3laea3K5dftV_oB0EP38ylbcg1MDBO7z3zez1ccuj_Ye9LqOAuncqWc8dJ27pXqC/exec"; 
    const MY_LIFF_ID = "2009975524-xymUHzaC"; // แก้ไขเป็น c เล็กตามหน้าจอ LIFF ID ของคุณกล้า

    let userDisplayName = "";

    // บันทึกที่อยู่ไว้ในเครื่อง ไม่ต้องพิมพ์ใหม่ทุกครั้ง
    function saveAddress() {
        localStorage.setItem("veco_address_admin", document.getElementById("shopAddress").value);
    }

    function loadSavedAddress() {
        const savedAddr = localStorage.getItem("veco_address_admin");
        if (savedAddr) document.getElementById("shopAddress").value = savedAddr;
    }

    // เริ่มการทำงานของ LIFF
    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                
                // แสดงข้อมูลแอดมินบนหน้าการ์ด
                document.getElementById('profile-pic').src = profile.pictureUrl;
                document.getElementById('profile-name').innerText = "แอดมิน: " + profile.displayName;
                document.getElementById('profileArea').style.display = 'block';

                loadSavedAddress();
                loadProducts(); 
            }
        } catch (error) { 
            console.error("LIFF Error:", error);
            document.getElementById("product-list").innerHTML = "<p style='color:red;'>กรุณาเปิดผ่าน LINE (LIFF)</p>";
        }
    }

    // ดึงข้อมูลจากชีตมาแสดง (คอลัมน์ A ต้องตรงกับชื่อ LINE แอดมิน)
    async function loadProducts() {
        const listDiv = document.getElementById("product-list");
        try {
            const resp = await fetch(`${SCRIPT_URL}?shopName=${encodeURIComponent(userDisplayName)}`);
            const products = await resp.json();
            
            if (!products || products.length === 0) {
                listDiv.innerHTML = "<p style='color:#999;'>ยังไม่มีรายการสินค้า</p>";
                return;
            }

            let html = "";
            products.forEach(row => {
                if(row[0] === "shopName") return; // ข้ามแถวหัวตาราง
                html += `
                    <div class="product-item">
                        <div>
                            <strong>${row[1]}</strong><br>
                            <small>เกรดสวย: ${row[2]}฿ | ตำหนิ: ${row[3]}฿ / ${row[4]}฿</small>
                        </div>
                        <button class="btn-del" onclick="confirmDelete('${row[1]}')">ลบ</button>
                    </div>`;
            });
            listDiv.innerHTML = html;
        } catch (e) { 
            listDiv.innerHTML = "<p style='color:red;'>ไม่สามารถดึงข้อมูลได้ (ตรวจสอบ URL หรือ CORS)</p>"; 
        }
    }

    // ส่งข้อมูลไปบันทึกในชีต
    async function sendData(actionType, targetItem = null) {
        const itemName = targetItem || document.getElementById("itemName").value;
        if (!itemName) return alert("กรุณาระบุชื่อสินค้า");

        const btn = document.getElementById("mainBtn");
        btn.disabled = true;
        btn.innerText = "กำลังบันทึกลงชีต...";

        const payload = {
            action: actionType,
            shopName: userDisplayName, // A: shopName
            itemName: itemName,        // B: itemName
            price1: document.getElementById("p1").value || 0, // C
            price2: document.getElementById("p2").value || 0, // D
            price3: document.getElementById("p3").value || 0, // E
            price4: document.getElementById("p4").value || 0, // F
            address: document.getElementById("shopAddress").value // H: locate
        };

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // ใช้ no-cors เพื่อเลี่ยงปัญหาความปลอดภัยเบื้องต้น
                body: JSON.stringify(payload)
            });
            alert("บันทึกข้อมูลเรียบร้อย!");
            location.reload(); 
        } catch (e) { 
            alert("เกิดข้อผิดพลาดในการส่งข้อมูล"); 
            btn.disabled = false;
            btn.innerText = "เพิ่มสินค้าใหม่";
        }
    }

    function confirmDelete(name) {
        if(confirm(`ต้องการลบรายการ "${name}" ใช่หรือไม่?`)) sendData('delete', name);
    }

    // รัน LIFF ทันทีเมื่อโหลดหน้า
    initLiff();
</script>
</body>
</html>
